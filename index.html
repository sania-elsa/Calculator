<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <!-- Hidden inputs -->
  <input type="radio" name="calc" id="c" checked>
  <input type="radio" name="calc" id="0">
  <input type="radio" name="calc" id="1">
  <input type="radio" name="calc" id="2">
  <input type="radio" name="calc" id="3">
  <input type="radio" name="calc" id="4">
  <input type="radio" name="calc" id="5">
  <input type="radio" name="calc" id="6">
  <input type="radio" name="calc" id="7">
  <input type="radio" name="calc" id="8">
  <input type="radio" name="calc" id="9">
  <input type="radio" name="calc" id="add">
  <input type="radio" name="calc" id="sub">
  <input type="radio" name="calc" id="mul">
  <input type="radio" name="calc" id="div">

  <!-- Display -->
  <div class="display"></div>

  <!-- Buttons -->
  <div class="buttons">
    <label for="c" class="btn gray">AC</label>
    <label class="btn gray">±</label>
    <label class="btn gray">%</label>
    <label for="div" class="btn orange">÷</label>

    <label for="7" class="btn dark">7</label>
    <label for="8" class="btn dark">8</label>
    <label for="9" class="btn dark">9</label>
    <label for="mul" class="btn orange">×</label>

    <label for="4" class="btn dark">4</label>
    <label for="5" class="btn dark">5</label>
    <label for="6" class="btn dark">6</label>
    <label for="sub" class="btn orange">−</label>

    <label for="1" class="btn dark">1</label>
    <label for="2" class="btn dark">2</label>
    <label for="3" class="btn dark">3</label>
    <label for="add" class="btn orange">+</label>

    <label for="0" class="btn dark zero">0</label>
    <label class="btn dark">.</label>
    <label class="btn orange">=</label>
  </div>

</div>

</body>
</html>
