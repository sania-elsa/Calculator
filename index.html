<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <!-- Hidden inputs -->
  <input type="radio" name="calc" id="btn-c" checked>
  <input type="radio" name="calc" id="btn-0">
  <input type="radio" name="calc" id="btn-1">
  <input type="radio" name="calc" id="btn-2">
  <input type="radio" name="calc" id="btn-3">
  <input type="radio" name="calc" id="btn-4">
  <input type="radio" name="calc" id="btn-5">
  <input type="radio" name="calc" id="btn-6">
  <input type="radio" name="calc" id="btn-7">
  <input type="radio" name="calc" id="btn-8">
  <input type="radio" name="calc" id="btn-9">
  <input type="radio" name="calc" id="btn-add">
  <input type="radio" name="calc" id="btn-sub">
  <input type="radio" name="calc" id="btn-mul">
  <input type="radio" name="calc" id="btn-div">

  <!-- Display -->
  <div class="display"></div>

  <!-- Buttons -->
  <div class="buttons">
    <label for="btn-c" class="btn clear">AC</label>
    <label class="btn op">±</label>
    <label class="btn op">%</label>
    <label for="btn-div" class="btn op">÷</label>

    <label for="btn-7" class="btn">7</label>
    <label for="btn-8" class="btn">8</label>
    <label for="btn-9" class="btn">9</label>
    <label for="btn-mul" class="btn op">×</label>

    <label for="btn-4" class="btn">4</label>
    <label for="btn-5" class="btn">5</label>
    <label for="btn-6" class="btn">6</label>
    <label for="btn-sub" class="btn op">−</label>

    <label for="btn-1" class="btn">1</label>
    <label for="btn-2" class="btn">2</label>
    <label for="btn-3" class="btn">3</label>
    <label for="btn-add" class="btn op">+</label>

    <label for="btn-0" class="btn zero">0</label>
    <label class="btn">.</label>
    <label class="btn equal">=</label>
  </div>

</div>

</body>
</html>
